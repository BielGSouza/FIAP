<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros Passos JavaScript</title>
</head>

<body>
    <script>
        var baseMaior = prompt("Informe a base maior");

        var baseMenor = prompt("Informe a base menor");

        var altura = prompt("Informe a altura");

        var area = (baseMaior + baseMenor) * altura / 2;

        alert("Area do trapezio = " + area);
    </script>
</body>

</html>
