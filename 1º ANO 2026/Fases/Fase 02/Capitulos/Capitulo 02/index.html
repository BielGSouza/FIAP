<!DOCTYPE html> <!-- Declaração do tipo de documento -->
<html lang="en"> <!-- Tag que indica o idioma do documento -->
<head> <!-- Cabeçalho do documento INICIO-->
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura a viewport para dispositivos móveis -->
    <title>Document</title> <!-- Título do documento -->
</head> <!-- Cabeçalho do documento FIM-->
<body> <!-- Corpo do documento INICIO-->
    <h1>Olá, mundo!</h1> <!-- Título de nível 1 pode ir até nível 6 (h1-h6)-->
    <p>Este é um parágrafo de exemplo.</p>

    <img src="./image/imagem01.jpg" alt=""> <!-- Tag de imagem, o atributo src define o caminho da imagem e alt é um texto alternativo para acessibilidade -->
    <img src="./image/imagem02.jpg" alt="">
    <img src="./image/imagem03.jpg" alt="">
</body> <!-- Corpo do documento FIM-->
</html>
